# ====== Package: TRV -> Generic Sync for all rooms ======
# Dieses Paket spiegelt Änderungen am PHYSISCHEN Thermostat (TRV)
# zurück auf den jeweiligen "externen" Generic-Thermostat, damit
# sich Euer Dashboard-Regler entsprechend aktualisiert.
#
# Sicherungen gegen Ping-Pong:
# - 2s Debounce
# - Temperatur nur übernehmen, wenn Differenz > 0.3 °C
# - Nur wenn Fenster zu (wo vorhanden)
#
# Räume & Entitäten (gemäß Deiner letzten Liste):
#  - Wohnzimmer: TRV climate.thermostat_wohnzimmer -> Generic climate.heizung_wohnzimmer_extern
#  - Schlafzimmer: TRV climate.thermostat_schlafzimmer -> Generic climate.heizung_schlafzimmer_extern
#  - Küche: TRV climate.kuche_thermostat -> Generic climate.heizung_kuche_extern
#  - Esszimmer: TRV climate.thermostat_esszimmer -> Generic climate.heizung_esszimmer_extern
#  - Badezimmer: TRV climate.thermostat_badezimmer -> Generic climate.heizung_badezimmer_extern
#  - Amelie: TRV climate.thermostat_amelie -> Generic climate.heizung_amelie_extern
#  - Ankleidezimmer: TRV climate.ankleidezimmer -> Generic climate.heizung_ankleidezimmer_extern
#  - Justus: TRV climate.justus_zimmer_2 -> Generic climate.heizung_justus_extern
#
# Fensterkontakte:
#  - Wohnzimmer: binary_sensor.fenster_wohnzimmer_links_contact
#  - Schlafzimmer: binary_sensor.fenster_schlafzimmer_contact
#  - Küche: binary_sensor.fenster_kuche_contact
#  - Esszimmer: binary_sensor.fenster_esszimmer_contact
#  - Badezimmer: binary_sensor.fenster_badezimmer_contact
#  - Amelie: binary_sensor.fenstersensor_amelie_contact
#  - Ankleidezimmer: binary_sensor.fenster_ankleidezimmer_contact
#  - Justus: keiner

automation:

  # ===== Wohnzimmer =====
  - id: wz_trv_to_generic_mode
    alias: "Wohnzimmer – TRV→Generic Modus"
    mode: restart
    trigger:
      - platform: state
        entity_id: climate.thermostat_wohnzimmer
        for: "00:00:02"
    condition:
      - condition: state
        entity_id: binary_sensor.fenster_wohnzimmer_links_contact
        state: "off"
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('climate.thermostat_wohnzimmer') == 'off' and states('climate.heizung_wohnzimmer_extern') != 'off' }}"
            sequence:
              - service: climate.set_hvac_mode
                target: { entity_id: climate.heizung_wohnzimmer_extern }
                data: { hvac_mode: "off" }
          - conditions:
              - condition: template
                value_template: "{{ states('climate.thermostat_wohnzimmer') != 'off' and states('climate.heizung_wohnzimmer_extern') != 'heat' }}"
            sequence:
              - service: climate.set_hvac_mode
                target: { entity_id: climate.heizung_wohnzimmer_extern }
                data: { hvac_mode: heat }
        default: []

  - id: wz_trv_to_generic_temp
    alias: "Wohnzimmer – TRV→Generic Temperatur"
    mode: restart
    trigger:
      - platform: state
        entity_id: climate.thermostat_wohnzimmer
        attribute: temperature
        for: "00:00:02"
    condition:
      - condition: state
        entity_id: binary_sensor.fenster_wohnzimmer_links_contact
        state: "off"
      - condition: template
        value_template: >
          {% set trv = state_attr('climate.thermostat_wohnzimmer','temperature') %}
          {% set gen = state_attr('climate.heizung_wohnzimmer_extern','temperature') %}
          {{ trv is number and gen is number and (trv|float - gen|float)|abs > 0.3 }}
    action:
      - service: climate.set_temperature
        target: { entity_id: climate.heizung_wohnzimmer_extern }
        data:
          temperature: "{{ state_attr('climate.thermostat_wohnzimmer','temperature')|float|round(1) }}"

