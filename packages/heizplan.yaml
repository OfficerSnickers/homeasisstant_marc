    icon: mdi:radiator-off
  nachtabsenkung_amelie:
    name: Amelie Nachtabsenkung aktiv
    icon: mdi:radiator-off
  nachtabsenkung_esszimmer:
    name: Esszimmer Nachtabsenkung aktiv
    icon: mdi:radiator-off
