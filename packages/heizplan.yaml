# ===== Heizplan / Nachtabsenkung (Package) =====

input_datetime:
  heizung_nacht_start:
    name: Heizung Nacht Start
    has_date: false
    has_time: true
    initial: "22:00:00"   # Standard: aus ab 22:00
  heizung_nacht_ende:
    name: Heizung Nacht Ende
    has_date: false
    has_time: true
    initial: "05:30:00"   # Standard: wieder an um 05:30

