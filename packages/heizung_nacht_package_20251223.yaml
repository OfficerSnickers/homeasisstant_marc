          # Justus
          - conditions:
              - condition: state
                entity_id: input_boolean.nachtabsenkung_justus
                state: "on"
            sequence:
              - service: climate.set_hvac_mode
                target: { entity_id: climate.heizung_justus_extern }
                data: { hvac_mode: heat }
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ 'heat' in (state_attr('climate.0x0cae5ffffed0cb38xx','hvac_modes') or []) }}"
                    sequence:
                      - service: climate.set_hvac_mode
                        target: { entity_id: climate.0x0cae5ffffed0cb38xx }
                        data: { hvac_mode: heat }
                default:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ 'auto' in (state_attr('climate.0x0cae5ffffed0cb38xx','hvac_modes') or []) }}"
                        sequence:
                          - service: climate.set_hvac_mode
                            target: { entity_id: climate.0x0cae5ffffed0cb38xx }
                            data: { hvac_mode: auto }
                    default:
                      - service: climate.turn_on
                        target: { entity_id: climate.0x0cae5ffffed0cb38xx }
        default: []