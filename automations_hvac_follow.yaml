
# ======================================================================
#  Heizung – Ergänzung: TRV folgt Generic (hvac_action)
#  Zweck: Wenn der externe Generic Heizbedarf meldet ("heating"),
#         wird am echten Thermostat (TRV) HEAT gesetzt und die Solltemp
#         erneut übertragen (Kick gegen Deadband).
#  Hinweis: Diese Datei zusätzlich zur bestehenden automations.yaml einbinden
#           (z.B. via !include) oder Inhalt ans Ende kopieren.
# ======================================================================

# ------------------------
# Wohnzimmer
# ------------------------
- id: wz_follow_hvac_action
  alias: "Wohnzimmer – TRV folgt Generic (hvac_action)"
  mode: restart
  trigger:
    - platform: state
      entity_id: climate.heizung_wohnzimmer_extern
      attribute: hvac_action
  condition:
    - condition: state
      entity_id: binary_sensor.fenster_wohnzimmer_links_contact
      state: "off"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ state_attr('climate.heizung_wohnzimmer_extern','hvac_action') == 'heating' }}"
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ 'heat' in (state_attr('climate.thermostat_wohnzimmer','hvac_modes') or []) }}"
                  sequence:
                    - service: climate.set_hvac_mode
                      target: { entity_id: climate.thermostat_wohnzimmer }
                      data: { hvac_mode: heat }
              default:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ 'auto' in (state_attr('climate.thermostat_wohnzimmer','hvac_modes') or []) }}"
                      sequence:
                        - service: climate.set_hvac_mode
                          target: { entity_id: climate.thermostat_wohnzimmer }
                          data: { hvac_mode: auto }
                  default: []
            - service: climate.set_temperature
              target: { entity_id: climate.thermostat_wohnzimmer }
              data:
                temperature: >
                  {% set step = state_attr('climate.thermostat_wohnzimmer','target_temp_step')|float(0.5) %}
                  {% set t = state_attr('climate.heizung_wohnzimmer_extern','temperature')|float(20) %}
                  {{ ((t/step)|round(0) * step) | round(1) }}
        - conditions:
            - condition: template
              value_template: "{{ state_attr('climate.heizung_wohnzimmer_extern','hvac_action') in ['idle','off'] }}"
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ 'heat' in (state_attr('climate.thermostat_wohnzimmer','hvac_modes') or []) }}"
                  sequence:
                    - service: climate.set_hvac_mode
                      target: { entity_id: climate.thermostat_wohnzimmer }
                      data: { hvac_mode: heat }
              default: []
      default: []

