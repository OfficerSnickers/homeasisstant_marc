# ------------------------
# KГѓЖ’Г…вЂњCHE
# ------------------------

- id: k_trv_external_enforce
  alias: "KГѓЖ’Г‚Вјche ГѓВўГўвЂљВ¬Гўв‚¬Е“ TRV externer Sensor & Temperatur injizieren"
  mode: restart
  trigger:
    - platform: state
      entity_id: sensor.thermometer_kuche_temperature
    - platform: time_pattern
      minutes: "/2"
  action:
    - variables:
        sel: "select.kuche_thermostat_temperature_sensor_select"
        num: "number.kuche_thermostat_external_temperature_input"
        ext: "{{ states('sensor.thermometer_kuche_temperature') | float(999) }}"
        cur: "{{ states('number.kuche_thermostat_external_temperature_input') | float(999) }}"
        opts: "{{ state_attr('select.kuche_thermostat_temperature_sensor_select','options') or [] }}"
    - choose:
