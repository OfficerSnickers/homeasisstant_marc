# GUARD: Modus-Sync mit unterdrГѓЖ’Г‚Вјcktem OFF-Propagieren (auГѓЖ’Г…Вёer bei Nachtabsenkung)
- id: ju_sync_mode
  alias: "Justus ГѓВўГўвЂљВ¬Гўв‚¬Е“ Sync TRVГѓВўГўв‚¬В Гўв‚¬Generic Modus (guarded)"
  mode: restart
  trigger:
    - platform: state
      entity_id: climate.0x0cae5ffffed0cb38xx
      for: "00:00:02"
    - platform: state
      entity_id: climate.heizung_justus_extern
      for: "00:00:02"
  action:
    - choose:
        # TRV -> Generic
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'climate.0x0cae5ffffed0cb38xx' }}"
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ states('climate.0x0cae5ffffed0cb38xx') != 'off' and states('climate.heizung_justus_extern') != 'heat' }}"
                  sequence:
                    - service: climate.set_hvac_mode
                      target: { entity_id: climate.heizung_justus_extern }
                      data: { hvac_mode: heat }
              default: []
        # Generic -> TRV (OFF wird geblockt, wenn Nachtabsenkung_justus nicht aktiv)
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'climate.heizung_justus_extern' }}"
          sequence:
            - choose:
                # OFF vom externen -> TRV nur, wenn Nachtabsenkung aktiv
                - conditions:
                    - condition: state
                      entity_id: climate.heizung_justus_extern
                      state: "off"
                    - condition: template
                      value_template: "{{ is_state('input_boolean.nachtabsenkung_justus','on') }}"
                  sequence:
                    - service: climate.set_hvac_mode
                      target: { entity_id: climate.0x0cae5ffffed0cb38xx }
                      data: { hvac_mode: "off" }
                # HEAT vom externen -> TRV auf HEAT
                - conditions:
                    - condition: state
                      entity_id: climate.heizung_justus_extern
                      state: "heat"
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ 'heat' in (state_attr('climate.0x0cae5ffffed0cb38xx','hvac_modes') or []) }}"
                          sequence:
                            - service: climate.set_hvac_mode
                              target: { entity_id: climate.0x0cae5ffffed0cb38xx }
                              data: { hvac_mode: heat }
                      default:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ 'auto' in (state_attr('climate.0x0cae5ffffed0cb38xx','hvac_modes') or []) }}"
                              sequence:
                                - service: climate.set_hvac_mode
                                  target: { entity_id: climate.0x0cae5ffffed0cb38xx }
                                  data: { hvac_mode: auto }
                          default:
                            - service: climate.turn_on
                              target: { entity_id: climate.0x0cae5ffffed0cb38xx }
              default: []
      default: []

- id: ju_sync_temp
  alias: "Justus ГѓВўГўвЂљВ¬Гўв‚¬Е“ Sync TRVГѓВўГўв‚¬В Гўв‚¬Generic Temperatur"
  mode: restart
  trigger:
    - platform: state
      entity_id: climate.0x0cae5ffffed0cb38xx
      attribute: temperature
      for: "00:00:02"
    - platform: state
      entity_id: climate.heizung_justus_extern
      attribute: temperature
      for: "00:00:02"
  action:
    - choose:
        - conditions: [ { condition: template, value_template: "{{ trigger.entity_id == 'climate.0x0cae5ffffed0cb38xx' }}" } ]
          sequence:
            - service: climate.set_temperature
              target: { entity_id: climate.heizung_justus_extern }
              data:
                temperature: >
                  {% set trv = state_attr('climate.0x0cae5ffffed0cb38xx','temperature')|float %}
                  {{ trv | round(1) }}
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'climate.heizung_justus_extern' }}"
            - condition: state
              entity_id: climate.heizung_justus_extern
              state: "heat"
          sequence:
            - service: climate.set_temperature
              target: { entity_id: climate.0x0cae5ffffed0cb38xx }
              data:
                temperature: >
                  {% set step = state_attr('climate.0x0cae5ffffed0cb38xx','target_temp_step')|float(0.5) %}
                  {% set t = state_attr('climate.heizung_justus_extern','temperature')|float %}
                  {{ ((t/step)|round(0) * step) | round(1) }}

# Guard: Re-Arm TRV falls fГѓЖ’Г‚В¤lschlich OFF bleibt, obwohl geheizt werden mГѓЖ’Г‚Вјsste
- id: ju_heat_guard
  alias: "Justus ГѓВўГўвЂљВ¬Гўв‚¬Е“ Heat Guard (re-arm TRV)"
  mode: restart
  trigger:
    - platform: time_pattern
      minutes: "/1"
    - platform: state
      entity_id: sensor.thermometer_justus_temperature
    - platform: state
      entity_id: climate.heizung_justus_extern
      attribute: temperature
    - platform: state
      entity_id: climate.0x0cae5ffffed0cb38xx
  condition:
    - condition: state
      entity_id: climate.heizung_justus_extern
      state: "heat"
    - condition: template
      value_template: >
        {% set ext = states('sensor.thermometer_justus_temperature')|float(999) %}
        {% set tgt = state_attr('climate.heizung_justus_extern','temperature')|float(999) %}
        {{ ext != 999 and tgt != 999 and ext <= tgt - 0.2 }}
    - condition: state
      entity_id: climate.0x0cae5ffffed0cb38xx
      state: "off"
    - condition: template
      value_template: "{{ not is_state('input_boolean.nachtabsenkung_justus','on') }}"
  action:
    - variables:
        step: "{{ state_attr('climate.0x0cae5ffffed0cb38xx','target_temp_step')|float(0.5) }}"
        tgt: "{{ state_attr('climate.heizung_justus_extern','temperature')|float }}"
    - service: climate.set_hvac_mode
      target: { entity_id: climate.0x0cae5ffffed0cb38xx }
      data: { hvac_mode: heat }
    - service: climate.set_temperature
      target: { entity_id: climate.0x0cae5ffffed0cb38xx }
      data:
        temperature: "{{ ((tgt/step)|round(0) * step) | round(1) }}"

# Trace: logge, wenn der externe Regler OFF geht
- id: ju_trace_external_off
  alias: "Justus ГѓВўГўвЂљВ¬Гўв‚¬Е“ Trace external OFF"
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id: climate.heizung_justus_extern
      to: "off"
  action:
    - service: logbook.log
      data:
        name: "Heizung Justus (Trace)"
        message: "External climate wurde OFF gesetzt. Ursache: siehe AuslГѓЖ’Г‚В¶ser/Automationen."
        entity_id: climate.heizung_justus_extern


# ------------------------
# GLOBAL: Warnung > 25 ГѓвЂљГ‚В°C (nur an Marc)
# ------------------------
- id: warnung_ueber_25c
  alias: "Warnung: Raum ГѓЖ’Г‚Вјber 25ГѓвЂљГ‚В°C"
  mode: single
  trigger:
    - platform: numeric_state
      entity_id:
        - sensor.thermometer_amelie_temperature
        - sensor.thermometer_ankleidezimmer_temperature
        - sensor.thermometer_badezimmer_temperature
        - sensor.thermometer_esszimmer_temperature
        - sensor.thermometer_justus_temperature
        - sensor.thermometer_kuche_temperature
        - sensor.thermometer_schlafzimmer_temperature
        - sensor.0x00124b002fa14d14_temperature
      above: 25
  action:
    - variables:
        raum: "{{ trigger.to_state.name }}"
        temp: "{{ trigger.to_state.state }}"
    - service: notify.mobile_app_iphone_16_pro_max_marc
      data:
        message: "ГѓВ°Г…ВёГўв‚¬Г‚ВҐ {{ raum }} hat {{ temp }} ГѓвЂљГ‚В°C erreicht. Bitte prГѓЖ’Г‚Вјfen/lГѓЖ’Г‚Вјften."

