п»ї# ==========================
#  Heizung ГѓВўГўвЂљВ¬Гўв‚¬Е“ VollstГѓЖ’Г‚В¤ndige Automationsdatei
#  Stand: 2025-12-21
#  RГѓЖ’Г‚В¤ume: Wohnzimmer, Schlafzimmer, KГѓЖ’Г‚Вјche, Esszimmer, Badezimmer, Ankleidezimmer, Amelie, Justus
#  Anforderungen:
#   - Externer FГѓЖ’Г‚Вјhler erzwingen + Temperatur injizieren
#   - Generic (extern) <-> TRV: Modus + Solltemperatur spiegeln
#   - Fenster-Logik (Pause/Resume) pro Raum (auГѓЖ’Г…Вёer Justus, kein Fensterkontakt)
#   - Beim Start alle Generic auf HEAT
#   - Push bei > 25ГѓвЂљГ‚В°C
# ==========================

# ------------------------
# HELFER: STARTUP ГѓВўГўвЂљВ¬Гўв‚¬Е“ alle externen Regler auf HEAT
# ------------------------
- id: heizung_startup_generic_heat
  alias: "Heizung ГѓВўГўвЂљВ¬Гўв‚¬Е“ Startup: alle externen Regler auf HEAT"
  mode: single
  trigger:
    - platform: homeassistant
      event: start
  action:
    - service: climate.set_hvac_mode
      target:
        entity_id:
          - climate.heizung_wohnzimmer_extern
          - climate.heizung_schlafzimmer_extern
          - climate.heizung_kuche_extern
          - climate.heizung_esszimmer_extern
          - climate.heizung_badezimmer_extern
          - climate.heizung_ankleidezimmer_extern
          - climate.heizung_amelie_extern
          - climate.heizung_justus_extern
      data:
        hvac_mode: heat

# ======================================================================
#  BLOCK: PRO RAUM ГѓВўГўвЂљВ¬Гўв‚¬Е“ externe FГѓЖ’Г‚Вјhler erzwingen + injizieren + Sync + Fenster
# ======================================================================

# ------------------------
# WOHNZIMMER
# ------------------------

# 1) TRV: externen Sensor erzwingen + externe Temperatur injizieren
- id: wz_trv_external_enforce
  alias: "Wohnzimmer ГѓВўГўвЂљВ¬Гўв‚¬Е“ TRV externer Sensor & Temperatur injizieren"
  mode: restart
  trigger:
    - platform: state
      entity_id: sensor.0x00124b002fa14d14_temperature
    - platform: time_pattern
      minutes: "/2"
  condition: []
  action:
    - variables:
        sel: "select.thermostat_wohnzimmer_temperature_sensor_select"
        num: "number.thermostat_wohnzimmer_external_temperature_input"
        ext: "{{ states('sensor.0x00124b002fa14d14_temperature') | float(999) }}"
        cur: "{{ states('number.thermostat_wohnzimmer_external_temperature_input') | float(999) }}"
        opts: "{{ state_attr('select.thermostat_wohnzimmer_temperature_sensor_select','options') or [] }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ 'external' in opts }}"
          sequence:
            - service: select.select_option
              target: { entity_id: "{{ sel }}" }
              data: { option: "external" }
        - conditions:
            - condition: template
              value_template: "{{ 'external_2' in opts }}"
          sequence:
            - service: select.select_option
              target: { entity_id: "{{ sel }}" }
              data: { option: "external_2" }
        - conditions:
            - condition: template
              value_template: "{{ 'external_3' in opts }}"
          sequence:
            - service: select.select_option
              target: { entity_id: "{{ sel }}" }
              data: { option: "external_3" }
      default: []
    - condition: template
      value_template: "{{ ext != 999 and cur != 999 and (ext - cur) | abs > 0.1 }}"
    - service: number.set_value
      target: { entity_id: "{{ num }}" }
      data:
        value: "{{ ext | round(1) }}"

# 2) Modus-Sync: Generic <-> TRV
- id: wz_sync_mode
  alias: "Wohnzimmer ГѓВўГўвЂљВ¬Гўв‚¬Е“ Sync TRVГѓВўГўв‚¬В Гўв‚¬Generic Modus"
  mode: restart
  trigger:
    - platform: state
      entity_id: climate.thermostat_wohnzimmer
      for: "00:00:02"
    - platform: state
      entity_id: climate.heizung_wohnzimmer_extern
      for: "00:00:02"
  condition:
    - condition: state
      entity_id: binary_sensor.fenster_wohnzimmer_links_contact
      state: "off"
  action:
    - choose:
        # TRV -> Generic
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'climate.thermostat_wohnzimmer' }}"
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ states('climate.thermostat_wohnzimmer') == 'off' and states('climate.heizung_wohnzimmer_extern') != 'off' }}"
                  sequence:
                    - service: climate.set_hvac_mode
                      target: { entity_id: climate.heizung_wohnzimmer_extern }
                      data: { hvac_mode: "off" }
                - conditions:
                    - condition: template
                      value_template: "{{ states('climate.thermostat_wohnzimmer') != 'off' and states('climate.heizung_wohnzimmer_extern') != 'heat' }}"
                  sequence:
                    - service: climate.set_hvac_mode
                      target: { entity_id: climate.heizung_wohnzimmer_extern }
                      data: { hvac_mode: heat }
              default: []
        # Generic -> TRV
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'climate.heizung_wohnzimmer_extern' }}"
          sequence:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: climate.heizung_wohnzimmer_extern
                      state: "off"
                  sequence:
                    - service: climate.set_hvac_mode
                      target: { entity_id: climate.thermostat_wohnzimmer }
                      data: { hvac_mode: "off" }
                - conditions:
                    - condition: state
                      entity_id: climate.heizung_wohnzimmer_extern
                      state: "heat"
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ 'heat' in (state_attr('climate.thermostat_wohnzimmer','hvac_modes') or []) }}"
                          sequence:
                            - service: climate.set_hvac_mode
                              target: { entity_id: climate.thermostat_wohnzimmer }
                              data: { hvac_mode: heat }
                      default:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ 'auto' in (state_attr('climate.thermostat_wohnzimmer','hvac_modes') or []) }}"
                              sequence:
                                - service: climate.set_hvac_mode
                                  target: { entity_id: climate.thermostat_wohnzimmer }
                                  data: { hvac_mode: auto }
                          default:
                            - service: climate.turn_on
                              target: { entity_id: climate.thermostat_wohnzimmer }
              default: []
      default: []

# 3) Temperatur-Sync (beide Richtungen, mit Toleranz & Schrittweite)
- id: wz_sync_temp
  alias: "Wohnzimmer ГѓВўГўвЂљВ¬Гўв‚¬Е“ Sync TRVГѓВўГўв‚¬В Гўв‚¬Generic Temperatur"
  mode: restart
  trigger:
    - platform: state
      entity_id: climate.thermostat_wohnzimmer
      attribute: temperature
      for: "00:00:02"
    - platform: state
      entity_id: climate.heizung_wohnzimmer_extern
      attribute: temperature
      for: "00:00:02"
  condition:
    - condition: state
      entity_id: binary_sensor.fenster_wohnzimmer_links_contact
      state: "off"
    - condition: template
      value_template: >
        {% set trv = state_attr('climate.thermostat_wohnzimmer','temperature') %}
        {% set gen = state_attr('climate.heizung_wohnzimmer_extern','temperature') %}
        {{ trv is number and gen is number and (trv|float - gen|float)|abs > 0.2 }}
  action:
    - choose:
        # TRV -> Generic
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'climate.thermostat_wohnzimmer' }}"
          sequence:
            - service: climate.set_temperature
              target: { entity_id: climate.heizung_wohnzimmer_extern }
              data:
                temperature: >
                  {% set trv = state_attr('climate.thermostat_wohnzimmer','temperature')|float %}
                  {{ trv | round(1) }}
        # Generic -> TRV (nur wenn Generic = HEAT)
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'climate.heizung_wohnzimmer_extern' }}"
            - condition: state
              entity_id: climate.heizung_wohnzimmer_extern
              state: "heat"
          sequence:
            - service: climate.set_temperature
              target: { entity_id: climate.thermostat_wohnzimmer }
              data:
                temperature: >
                  {% set step = state_attr('climate.thermostat_wohnzimmer','target_temp_step')|float(0.5) %}
                  {% set t = state_attr('climate.heizung_wohnzimmer_extern','temperature')|float %}
                  {{ ((t/step)|round(0) * step) | round(1) }}
      default: []

# 4) Fenster-Logik: Pause/Resume
- id: wz_window_pause_resume
  alias: "Wohnzimmer - Fenster Pause/Resume"
  mode: restart
  trigger:
    - platform: state
      entity_id: binary_sensor.fenster_wohnzimmer_links_contact
      to: ["on","off"]
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.state == 'on' }}"
          sequence:
            - service: input_number.set_value
              target: { entity_id: input_number.heizung_restore_wohnzimmer }
              data:
                value: "{{ state_attr('climate.heizung_wohnzimmer_extern','temperature') | float(20) }}"
            - service: climate.turn_off
              target: { entity_id: climate.thermostat_wohnzimmer }
            - service: climate.set_temperature
              target: { entity_id: climate.thermostat_wohnzimmer }
              data: { temperature: 5 }
            - service: climate.set_hvac_mode
              target: { entity_id: climate.heizung_wohnzimmer_extern }
              data: { hvac_mode: "off" }
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.state == 'off' }}"
          sequence:
            - delay: "00:00:10"
            - condition: state
              entity_id: binary_sensor.fenster_wohnzimmer_links_contact
              state: "off"
            - service: climate.set_temperature
              target: { entity_id: climate.heizung_wohnzimmer_extern }
              data:
                temperature: "{{ states('input_number.heizung_restore_wohnzimmer') | float(20) }}"
            - service: climate.set_hvac_mode
              target: { entity_id: climate.heizung_wohnzimmer_extern }
              data: { hvac_mode: heat }
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ 'heat' in (state_attr('climate.thermostat_wohnzimmer','hvac_modes') or []) }}"
                  sequence:
                    - service: climate.set_hvac_mode
                      target: { entity_id: climate.thermostat_wohnzimmer }
                      data: { hvac_mode: heat }
              default:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ 'auto' in (state_attr('climate.thermostat_wohnzimmer','hvac_modes') or []) }}"
                      sequence:
                        - service: climate.set_hvac_mode
                          target: { entity_id: climate.thermostat_wohnzimmer }
                          data: { hvac_mode: auto }
                  default:
                    - service: climate.turn_on
                      target: { entity_id: climate.thermostat_wohnzimmer }
            - service: climate.set_temperature
              target: { entity_id: climate.thermostat_wohnzimmer }
              data:
                temperature: "{{ states('input_number.heizung_restore_wohnzimmer') | float(20) }}"
# NEU: Wohnzimmer ГѓВўГўвЂљВ¬Гўв‚¬Е“ Fenster-OPEN-Sofortabschaltung (Failsafe)
- id: wz_window_open_fast_off
  alias: "Wohnzimmer ГѓВўГўвЂљВ¬Гўв‚¬Е“ Fenster offen Sofort-AUS (Failsafe)"
  mode: restart
  trigger:
    - platform: state
      entity_id: binary_sensor.fenster_wohnzimmer_links_contact
      to: "on"
      for: "00:00:05"
  action:
    - service: climate.turn_off
      target: { entity_id: climate.thermostat_wohnzimmer }
    - delay: "00:00:01"
    - service: climate.set_temperature
      target: { entity_id: climate.thermostat_wohnzimmer }
      data: { temperature: 5 }
    - service: climate.set_hvac_mode
      target: { entity_id: climate.heizung_wohnzimmer_extern }
      data: { hvac_mode: "off" }

# NEU: Wohnzimmer ГѓВўГўвЂљВ¬Гўв‚¬Е“ Fenster offen Guard (alle 30s sicher AUS)
- id: wz_window_open_guard
  alias: "Wohnzimmer ГѓВўГўвЂљВ¬Гўв‚¬Е“ Fenster offen Guard"
  mode: queued
  max: 3
  trigger:
    - platform: time_pattern
      seconds: "/30"
  condition:
    - condition: state
      entity_id: binary_sensor.fenster_wohnzimmer_links_contact
      state: "on"
  action:
    - service: climate.turn_off
      target: { entity_id: climate.thermostat_wohnzimmer }
    - service: climate.set_temperature
      target: { entity_id: climate.thermostat_wohnzimmer }
      data: { temperature: 5 }
    - service: climate.set_hvac_mode
      target: { entity_id: climate.heizung_wohnzimmer_extern }
      data: { hvac_mode: "off" }

